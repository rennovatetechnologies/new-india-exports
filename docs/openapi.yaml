openapi: 3.0.3
info:
  title: New India Exports API
  description: |
    Express backend for VISTARA / New India Exports.

    **Auth:** Most protected routes expect `Authorization: Bearer <JWT>`.
    Customer JWTs come from OTP verify / customer login; staff JWTs from staff login.
  version: 1.0.0
servers:
  - url: http://127.0.0.1:5001
    description: Local
  - url: /
    description: Relative (same host)
tags:
  - name: Health
  - name: Auth
  - name: Staff
  - name: RBAC
  - name: KYC
  - name: Cases
  - name: Vault
  - name: Payments
  - name: Plans
  - name: Billing
  - name: Events
  - name: Me
  - name: Notifications
  - name: Admin
  - name: Support

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    SuccessMessage:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
    Error:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
    TokenResponse:
      type: object
      properties:
        success:
          type: boolean
        token:
          type: string
        user:
          type: object
    OtpSendRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
        purpose:
          type: string
          description: Optional purpose tag (signup, login, etc.)
    OtpVerifyRequest:
      type: object
      required: [email, otp]
      properties:
        email:
          type: string
          format: email
        otp:
          type: string
    StaffLoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
    CreateOrderRequest:
      type: object
      properties:
        amount:
          type: number
          description: Amount in paise (optional; server may use defaults)
        currency:
          type: string
          default: INR
        receipt:
          type: string
        notes:
          type: object
          additionalProperties: true
    VerifyPaymentRequest:
      type: object
      required: [razorpay_order_id, razorpay_payment_id, razorpay_signature]
      properties:
        razorpay_order_id:
          type: string
        razorpay_payment_id:
          type: string
        razorpay_signature:
          type: string

paths:
  /:
    get:
      tags: [Health]
      summary: Health check
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string

  /api/auth/otp/send:
    post:
      tags: [Auth]
      summary: Send OTP to email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OtpSendRequest'
      responses:
        '200':
          description: OTP sent (dev may echo OTP)
        '429':
          description: Rate limited

  /api/auth/otp/resend:
    post:
      tags: [Auth]
      summary: Resend OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OtpSendRequest'
      responses:
        '200':
          description: OTP resent

  /api/auth/otp/verify:
    post:
      tags: [Auth]
      summary: Verify OTP and issue JWT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OtpVerifyRequest'
      responses:
        '200':
          description: Verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'

  /api/auth/customer/signup:
    post:
      tags: [Auth]
      summary: Customer signup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string }
                name: { type: string }
                phone: { type: string }
                company: { type: string }
      responses:
        '200':
          description: Signup result

  /api/auth/customer/login:
    post:
      tags: [Auth]
      summary: Customer login (OTP flow companion)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string }
      responses:
        '200':
          description: Login initiated / success

  /api/auth/staff/login:
    post:
      tags: [Auth]
      summary: Staff email/password login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StaffLoginRequest'
      responses:
        '200':
          description: Staff JWT
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'

  /api/auth/staff/register:
    post:
      tags: [Auth]
      summary: Staff registration / access request
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string }
                password: { type: string }
                name: { type: string }
                role: { type: string }
      responses:
        '200':
          description: Registered or pending approval

  /api/auth/me:
    get:
      tags: [Auth]
      summary: Current auth user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user

  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Logout (client discards token)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logged out

  /api/staff/access-requests:
    get:
      tags: [Staff]
      summary: List staff access requests
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Access requests

  /api/staff/access-requests/{reqId}:
    get:
      tags: [Staff]
      summary: Get access request
      security:
        - bearerAuth: []
      parameters:
        - name: reqId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Access request
    patch:
      tags: [Staff]
      summary: Approve/reject access request
      security:
        - bearerAuth: []
      parameters:
        - name: reqId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                status: { type: string }
                role: { type: string }
      responses:
        '200':
          description: Updated

  /api/staff/users:
    get:
